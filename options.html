<!doctype html>

<style>
  :root {
    color-scheme: light dark;
    font-family:  monospace;
  }

  body {
    /* Overrides for Chrome defaults. */
    font-family: monospace;
    font-size:   unset;

    /* Custom stuff. */
    padding:        1rem;
    margin-left:    auto;
    margin-right:   auto;
    display:        flex;
    gap:            1rem;
    flex-direction: column;
    overflow-x:     auto;
    overflow-y:     scroll;
    min-height:     100vh;
    max-width:      1024px;
